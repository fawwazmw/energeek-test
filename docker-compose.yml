version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: energeek-be/Dockerfile
    image: energeek-app
    restart: always
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    ports:
      - "8000:8000"
    environment:
      WAIT_HOSTS: postgres:5432
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: energeek_db
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./energeek-be:/app
      - ./energeek-fe/dist:/app/frontend/dist
    depends_on:
      - app
      - frontend

  frontend:
    build:
      context: .
      dockerfile: energeek-fe/Dockerfile
    image: energeek-frontend
    restart: always
    volumes:
      - ./energeek-fe:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost/api # Nginx will proxy to backend
    depends_on:
      - app

  postgres:
    image: postgres:16
    container_name: postgres_server
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: energeek_db
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_CONFIG_SERVER_MODE: "False"
      TZ: Asia/Jakarta
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
